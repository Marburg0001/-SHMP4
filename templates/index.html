<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISHMP4</title>

  <style>
    body {
      background: #0b0b0b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: auto;
    }

    .hero {
      text-align: center;
      padding: 80px 0;
    }

    h1 {
      font-size: 42px;
    }

    p {
      color: #bbb;
    }

    .download-box {
      background: #131313;
      padding: 25px;
      border-radius: 20px;
      margin-top: 30px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #0d0d0d;
      color: white;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #ff2b2b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="container">

      <h1>Video kaydetmenin en sade yolu</h1>
      <p>Linki ekle, işlemi başlat ve dosyayı al.</p>

      <div class="download-box">
        <h2>Bağlantıyı ekle</h2>

        <form action="/download" method="post" class="input-row">
          <input
            type="text"
            name="url"
            placeholder="Video linkini buraya yapıştır"
            required
          />
          <button type="submit">Kaydet</button>
        </form>

      </div>

    </div>
  </div>

</body>
</html>
