<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İSHMP4</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(56,189,248,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.14), transparent 28%),
        linear-gradient(135deg, #050816, #0b1120, #111827);
      color:#fff;
      padding:20px;
    }

    .topbar{
      width:100%;
      max-width:1100px;
      margin:0 auto 20px auto;
      display:flex;
      justify-content:flex-end;
      align-items:center;
    }

    .mini-menu{
      display:flex;
      gap:10px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:10px 14px;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    .mini-menu a{
      text-decoration:none;
      color:#cbd5e1;
      font-size:14px;
      transition:.25s ease;
    }

    .mini-menu a:hover{
      color:#67e8f9;
    }

    .container{
      width:100%;
      max-width:900px;
      margin:0 auto;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:30px;
      padding:35px 22px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:14px;
      margin-bottom:15px;
    }

    .socials .icon{
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.08);
      transition:.3s ease;
    }

    .socials .icon:hover{
      transform:translateY(-3px) scale(1.08);
      box-shadow:0 0 18px rgba(103,232,249,0.22);
      background:rgba(255,255,255,0.12);
    }

    .logo{
      text-align:center;
      font-size:56px;
      font-weight:800;
      letter-spacing:3px;
      margin-bottom:8px;
      color:#fff;
      text-shadow:
        0 0 5px #38bdf8,
        0 0 12px #38bdf8,
        0 0 24px #8b5cf6,
        0 0 40px #8b5cf6;
      animation:neonPulse 1.7s infinite alternate;
    }

    @keyframes neonPulse{
      from{
        text-shadow:
          0 0 5px #38bdf8,
          0 0 12px #38bdf8,
          0 0 24px #8b5cf6,
          0 0 40px #8b5cf6;
      }
      to{
        text-shadow:
          0 0 10px #67e8f9,
          0 0 20px #67e8f9,
          0 0 38px #a78bfa,
          0 0 65px #a78bfa;
      }
    }

    .subtitle{
      text-align:center;
      color:#cbd5e1;
      font-size:15px;
      margin-bottom:28px;
    }

    .input-area{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .input-area input{
      flex:1;
      min-width:220px;
      padding:16px 18px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.1);
      outline:none;
      background:rgba(255,255,255,0.06);
      color:#fff;
      font-size:15px;
      transition:.25s ease;
    }

    .input-area input::placeholder{
      color:#94a3b8;
    }

    .input-area input:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 4px rgba(56,189,248,0.12);
    }

    .analyze-btn, .download-btn{
      padding:16px 24px;
      border:none;
      border-radius:16px;
      font-size:15px;
      font-weight:700;
      color:#fff;
      cursor:pointer;
      transition:.3s ease;
      background:linear-gradient(90deg, #2563eb, #7c3aed);
      box-shadow:0 12px 24px rgba(37,99,235,.24);
    }

    .analyze-btn:hover, .download-btn:hover{
      transform:translateY(-2px);
    }

    .analyze-btn.active{
      background:linear-gradient(90deg, #f59e0b, #f97316);
      box-shadow:0 12px 24px rgba(249,115,22,.28);
    }

    .download-btn.ready{
      background:linear-gradient(90deg, #16a34a, #22c55e);
      box-shadow:0 12px 24px rgba(34,197,94,.28);
    }

    .preview-card{
      display:none;
      grid-template-columns:300px 1fr;
      gap:20px;
      margin-top:8px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:18px;
      align-items:center;
    }

    .thumb-box{
      width:100%;
      height:220px;
      border-radius:18px;
      overflow:hidden;
      position:relative;
      background:
        linear-gradient(135deg, rgba(56,189,248,0.25), rgba(139,92,246,0.25)),
        rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .thumb-box::before{
      content:"VIDEO";
      font-size:42px;
      font-weight:800;
      color:rgba(255,255,255,0.14);
      letter-spacing:4px;
    }

    .thumb-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      padding:14px;
      background:linear-gradient(to top, rgba(0,0,0,0.40), transparent 60%);
    }

    .thumb-badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      background:rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.14);
      color:#fff;
    }

    .meta h2{
      font-size:24px;
      line-height:1.35;
      margin-bottom:12px;
      word-break:break-word;
    }

    .platform-badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      color:#7dd3fc;
      background:rgba(56,189,248,0.12);
      border:1px solid rgba(56,189,248,0.2);
      margin-bottom:14px;
    }

    .meta p{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:18px;
      line-height:1.7;
    }

    .progress-wrap{
      display:none;
      margin-top:20px;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
    }

    .progress-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      font-size:14px;
      color:#cbd5e1;
    }

    .progress-bar{
      width:100%;
      height:16px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      overflow:hidden;
    }

    .progress-fill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #06b6d4, #8b5cf6);
      transition:width .25s linear;
    }

    .popup{
      position:fixed;
      top:24px;
      right:24px;
      min-width:260px;
      max-width:360px;
      padding:15px 18px;
      border-radius:16px;
      color:#fff;
      font-size:14px;
      display:none;
      z-index:9999;
      box-shadow:0 16px 40px rgba(0,0,0,.35);
      animation:popupIn .25s ease;
    }

    .popup.success{
      background:linear-gradient(90deg, #15803d, #22c55e);
    }

    .popup.error{
      background:linear-gradient(90deg, #b91c1c, #ef4444);
    }

    @keyframes popupIn{
      from{
        opacity:0;
        transform:translateY(-12px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .footer{
      text-align:center;
      margin-top:25px;
      font-size:12px;
      color:#94a3b8;
    }

    @media (max-width:768px){
      .preview-card{
        grid-template-columns:1fr;
      }

      .logo{
        font-size:40px;
      }

      .input-area{
        flex-direction:column;
      }

      .analyze-btn, .download-btn{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="popup" id="popup"></div>

  <div class="topbar">
    <div class="mini-menu">
      <a href="#">Ana Sayfa</a>
      <a href="#">Platformlar</a>
      <a href="#">Hakkında</a>
    </div>
  </div>

  <div class="container">
    <div class="socials">
      <div class="icon"><i class="fa-brands fa-instagram"></i></div>
      <div class="icon"><i class="fa-brands fa-tiktok"></i></div>
      <div class="icon"><i class="fa-brands fa-facebook-f"></i></div>
      <div class="icon"><i class="fa-brands fa-youtube"></i></div>
    </div>

    <div class="logo">İSHMP4</div>
    <div class="subtitle"> </div>

    <div class="input-area">
      <input type="text" id="videoUrl" placeholder="Video linkini buraya yapıştır..." />
      <button class="analyze-btn" id="analyzeBtn">Analiz Et</button>
    </div>

    <div class="preview-card" id="previewCard">
      <div class="thumb-box">
        <div class="thumb-overlay">
          <div class="thumb-badge" id="thumbBadge">Hazır</div>
        </div>
      </div>

      <div class="meta">
        <div class="platform-badge" id="platformBadge">Platform: Bilinmiyor</div>
        <h2 id="videoTitle">Video hazır görünüyor</h2>
        <p id="videoDesc">Link algılandıktan sonra burada platform bilgisi ve indir ekranı görünür.</p>
        <button class="download-btn" id="downloadBtn">İndir</button>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-head">
        <span id="progressText">İndirme hazırlanıyor...</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="footer">© 2026 İSHMP4 </div>
  </div>

  <script>
    const videoUrl = document.getElementById("videoUrl");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const previewCard = document.getElementById("previewCard");
    const platformBadge = document.getElementById("platformBadge");
    const videoTitle = document.getElementById("videoTitle");
    const videoDesc = document.getElementById("videoDesc");
    const thumbBadge = document.getElementById("thumbBadge");
    const downloadBtn = document.getElementById("downloadBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const progressPercent = document.getElementById("progressPercent");
    const popup = document.getElementById("popup");

    function showPopup(message, type = "success") {
      popup.className = "popup " + type;
      popup.textContent = message;
      popup.style.display = "block";

      setTimeout(() => {
        popup.style.display = "none";
      }, 2800);
    }

    function detectPlatform(url) {
      const lower = url.toLowerCase();

      if (lower.includes("instagram.com")) return "Instagram";
      if (lower.includes("tiktok.com")) return "TikTok";
      if (lower.includes("facebook.com") || lower.includes("fb.watch")) return "Facebook";
      if (lower.includes("youtube.com") || lower.includes("youtu.be")) return "YouTube";
      return "Bilinmiyor";
    }

    function generateFakeTitle(platform) {
      if (platform === "Instagram") return "Instagram videosu hazır görünüyor";
      if (platform === "TikTok") return "TikTok videosu hazır görünüyor";
      if (platform === "Facebook") return "Facebook videosu hazır görünüyor";
      if (platform === "YouTube") return "YouTube videosu hazır görünüyor";
      return "Video bağlantısı hazır görünüyor";
    }

    analyzeBtn.addEventListener("click", () => {
      const url = videoUrl.value.trim();

      if (!url) {
        showPopup("Link boş bırakılmış.", "error");
        return;
      }

      analyzeBtn.classList.add("active");
      analyzeBtn.textContent = "Analiz Ediliyor...";

      setTimeout(() => {
        const platform = detectPlatform(url);

        platformBadge.textContent = "Platform: " + platform;
        videoTitle.textContent = generateFakeTitle(platform);
        videoDesc.textContent = "Arayüz görünümü hazır. İndir butonuna basınca süreç animasyonlu şekilde çalışır.";
        thumbBadge.textContent = platform === "Bilinmiyor" ? "Genel Video" : platform;

        previewCard.style.display = "grid";

        analyzeBtn.classList.remove("active");
        analyzeBtn.textContent = "Analiz Et";

        showPopup("Link algılandı.", "success");
      }, 900);
    });

    downloadBtn.addEventListener("click", () => {
      progressWrap.style.display = "block";
      downloadBtn.classList.add("ready");
      downloadBtn.textContent = "Hazırlanıyor...";

      let percent = 0;
      progressFill.style.width = "0%";
      progressPercent.textContent = "0%";
      progressText.textContent = "İndirme başlatılıyor...";

      const interval = setInterval(() => {
        percent += Math.floor(Math.random() * 12) + 6;

        if (percent >= 100) {
          percent = 100;
        }

        progressFill.style.width = percent + "%";
        progressPercent.textContent = percent + "%";

        if (percent < 35) {
          progressText.textContent = "Bağlantı hazırlanıyor...";
        } else if (percent < 70) {
          progressText.textContent = "Dosya işleniyor...";
        } else if (percent < 100) {
          progressText.textContent = "İndirmeye hazır hale getiriliyor...";
        } else {
          progressText.textContent = "Tamamlandı.";
          clearInterval(interval);
          downloadBtn.textContent = "İndirildi";
          showPopup("İşlem tamamlandı.", "success");
        }
      }, 300);
    });
  </script>
</body>
</html>
