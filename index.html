<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İSHMP4</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(255, 0, 0, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 0, 0.08) 1px, transparent 1px),
        #0a0a0a;
      background-size: 40px 40px;
      color: white;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .logo {
      font-size: 34px;
      font-weight: 900;
      color: #ff1a1a;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
    }

    .platforms {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .platform-icon {
      width: 42px;
      height: 42px;
      border: 1px solid #ff1a1a;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ff1a1a;
      background: #111;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.15);
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .download-box {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .input-box {
      width: 100%;
      height: 54px;
      background: #111;
      border: 1px solid #ff1a1a;
      border-radius: 12px;
      outline: none;
      color: white;
      padding: 0 16px;
      font-size: 15px;
    }

    .download-btn {
      width: 160px;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #ff1a1a;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo">İSHMP4</div>

      <div class="platforms">
        <div class="platform-icon">IG</div>
        <div class="platform-icon">FB</div>
        <div class="platform-icon">TT</div>
      </div>
    </div>

    <div class="main">
      <div class="download-box">

        <form method="POST" onsubmit="clearLinkAfterSubmit()">
          <input
            type="text"
            name="link"
            id="linkInput"
            class="input-box"
            placeholder="Link yapıştır..."
          />
          <button class="download-btn">İndir</button>
        </form>

      </div>
    </div>
  </div>

  <script>
    function clearLinkAfterSubmit() {
      setTimeout(() => {
        document.getElementById("linkInput").value = "";
      }, 500);
    }
  </script>
</body>
</html>
